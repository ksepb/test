<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前鎮區 × 環保局｜1999 派工案件</title>
<style>
  :root{
    --bg:#EDF2F1;
    --card:#FFFFFF;
    --ink:#13262B;
    --ink-soft:#5A6E73;
    --line:#D8E2E0;
    --harbor:#0E6E8C;
    --harbor-deep:#0A4A5E;
    --ok:#1E8A5A;
    --ok-bg:#E2F3EA;
    --doing:#B3720A;
    --doing-bg:#FBF0DA;
    --other:#5A6E73;
    --other-bg:#EAEEED;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.55;
    padding-bottom:56px;
  }
  header{
    background:linear-gradient(160deg,var(--harbor-deep) 0%,var(--harbor) 100%);
    color:#fff;
    padding:26px 20px 22px;
  }
  .wrap{max-width:760px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.18em;opacity:.75;
    text-transform:uppercase;margin-bottom:6px;
  }
  h1{font-size:22px;font-weight:700;letter-spacing:.02em}
  h1 .x{opacity:.55;font-weight:400;margin:0 6px}
  .sub{font-size:13px;opacity:.8;margin-top:6px}

  .toolbar{
    max-width:760px;margin:-16px auto 0;padding:0 16px;
  }
  .toolbar-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;box-shadow:0 6px 18px rgba(10,74,94,.08);
  }
  .filter-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .date-row{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
  }
  .date-row label{font-size:13px;color:var(--ink-soft)}
  .date-row input[type="date"]{
    border:1px solid var(--line);border-radius:8px;padding:6px 8px;
    font-size:14px;font-family:inherit;color:var(--ink);background:#F9FBFB;
    min-width:0;
  }
  .date-row .tilde{color:var(--ink-soft)}
  .quick{
    border:1px solid var(--line);background:#F4F8F7;color:var(--ink-soft);
    border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;
  }
  .quick:hover{background:#E9F1EF}
  .chip{
    border:1px solid var(--line);background:#F4F8F7;color:var(--ink-soft);
    border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer;
    transition:all .15s ease;
  }
  .chip[aria-pressed="true"]{
    background:var(--harbor);border-color:var(--harbor);color:#fff;font-weight:600;
  }
  .chip:focus-visible,.btn:focus-visible,.quick:focus-visible,
  .date-row input:focus-visible{outline:3px solid #7FC3D8;outline-offset:2px}
  .spacer{flex:1}
  .btn{
    background:var(--harbor);color:#fff;border:none;border-radius:10px;
    padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;
  }
  .btn:disabled{opacity:.5;cursor:default}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:8px}
  .hint.err{color:#B3400A;font-weight:600}

  .summary{
    max-width:760px;margin:16px auto 0;padding:0 16px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  }
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;
  }
  .stat b{display:block;font-size:26px;font-variant-numeric:tabular-nums;line-height:1.2}
  .stat span{font-size:12px;color:var(--ink-soft)}
  .stat.doing b{color:var(--doing)}
  .stat.ok b{color:var(--ok)}

  main{max-width:760px;margin:14px auto 0;padding:0 16px}
  .meta-line{font-size:12px;color:var(--ink-soft);margin:4px 2px 10px}

  .case{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:10px;
  }
  .case-top{display:flex;align-items:flex-start;gap:10px}
  .badge{
    font-size:12px;font-weight:700;border-radius:6px;padding:3px 9px;white-space:nowrap;
  }
  .badge.doing{background:var(--doing-bg);color:var(--doing)}
  .badge.ok{background:var(--ok-bg);color:var(--ok)}
  .badge.other{background:var(--other-bg);color:var(--other)}
  .case .addr{font-size:15px;font-weight:600;flex:1}
  .case .row{font-size:13px;color:var(--ink-soft);margin-top:6px}
  .case .row b{color:var(--ink);font-weight:600}
  .case a{color:var(--harbor);text-decoration:none;font-size:13px}
  .case a:hover{text-decoration:underline}

  .state{
    background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
    padding:28px 20px;text-align:center;color:var(--ink-soft);font-size:14px;
  }
  .state code{
    display:inline-block;background:#F0F4F3;border-radius:6px;
    padding:2px 8px;font-size:12px;word-break:break-all;margin-top:8px;
  }
  .state .btn{margin-top:14px}

  footer{
    max-width:760px;margin:24px auto 0;padding:0 16px 20px;
    font-size:12px;color:var(--ink-soft);
  }
  footer a{color:var(--harbor)}
  @media (max-width:480px){
    .stat b{font-size:20px}
    .date-row input[type="date"]{flex:1}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="eyebrow">Kaohsiung Open1999</div>
    <h1>前鎮區<span class="x">×</span>環保局</h1>
    <div class="sub">派工案件即時查詢．已自動套用篩選，打開就是今天的結果</div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-card">
    <div class="filter-row">
      <button class="chip" id="chipDist" aria-pressed="true">前鎮區</button>
      <button class="chip" id="chipUnit" aria-pressed="true">環保局</button>
      <div class="spacer"></div>
      <button class="btn" id="btnQuery">查詢</button>
    </div>
    <div class="date-row">
      <label for="dateStart">日期</label>
      <input type="date" id="dateStart">
      <span class="tilde">～</span>
      <input type="date" id="dateEnd">
      <button class="quick" id="qToday">今天</button>
      <button class="quick" id="q7">近 7 天</button>
      <button class="quick" id="q30">近 30 天</button>
    </div>
    <div class="hint" id="hint">預設查詢當天案件；日期區間最長一年（資料來源限制）。</div>
  </div>
</div>

<div class="summary" id="summary" hidden>
  <div class="stat"><b id="stTotal">–</b><span>符合案件</span></div>
  <div class="stat doing"><b id="stDoing">–</b><span>處理中</span></div>
  <div class="stat ok"><b id="stDone">–</b><span>已結案</span></div>
</div>

<main>
  <div class="meta-line" id="metaLine"></div>
  <div id="list"></div>
</main>

<footer>
  資料來源：高雄市政府「Open1999 派工受理案件」開放資料。
  若需完整介面仍可前往 <a href="https://soweb.kcg.gov.tw/#/work" target="_blank" rel="noopener">官方查詢頁</a>。
</footer>

<script>
const API_BASE = "https://soweb.kcg.gov.tw/open1999/ServiceRequestsQuery.asmx/ServiceRequestsQuery";
const listEl = document.getElementById("list");
const metaEl = document.getElementById("metaLine");
const sumEl  = document.getElementById("summary");
const hintEl = document.getElementById("hint");
const dStart = document.getElementById("dateStart");
const dEnd   = document.getElementById("dateEnd");
const chips  = {
  dist: document.getElementById("chipDist"),
  unit: document.getElementById("chipUnit"),
};
let allRows = [];
let lastRange = "";

// ---- 日期工具 ----
function toISO(d){ // Date -> "YYYY-MM-DD"（用本地時區，避免跨日誤差）
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return y + "-" + m + "-" + dd;
}
function isoToApi(iso){ return iso.replaceAll("-",""); } // "YYYY-MM-DD" -> "YYYYMMDD"
function setRange(daysBack){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - daysBack);
  dStart.value = toISO(start);
  dEnd.value = toISO(end);
}
function validateRange(){
  if (!dStart.value || !dEnd.value) return "請選擇起始與結束日期。";
  if (dStart.value > dEnd.value) return "起始日期不能晚於結束日期。";
  const ms = new Date(dEnd.value) - new Date(dStart.value);
  if (ms > 366 * 24 * 60 * 60 * 1000) return "日期區間最長一年，請縮小範圍。";
  return "";
}

// ---- 顯示工具 ----
function badgeClass(status){
  const s = String(status || "");
  if (/結案|完成|已辦結/.test(s)) return "ok";
  if (/處理|辦理|派工|received|處理中/.test(s)) return "doing";
  return "other";
}
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function fmtDate(v){
  if (!v) return "";
  const m = String(v).match(/\/Date\((\d+)\)\//);
  if (m) {
    const d = new Date(Number(m[1]));
    return d.toLocaleString("zh-TW",{hour12:false});
  }
  return String(v);
}
function pick(row, keys){
  for (const k of keys){
    if (row[k] != null && row[k] !== "") return row[k];
    const found = Object.keys(row).find(x => x.toLowerCase() === k.toLowerCase());
    if (found && row[found] !== "") return row[found];
  }
  return "";
}

// ---- 篩選與渲染 ----
function applyFilters(){
  const useDist = chips.dist.getAttribute("aria-pressed") === "true";
  const useUnit = chips.unit.getAttribute("aria-pressed") === "true";

  const rows = allRows.filter(r=>{
    const zip  = String(pick(r,["ZipName","zipname"]));
    const unit = String(pick(r,["UnitName","ReplyUnit","unitname"]));
    if (useDist && !zip.includes("前鎮")) return false;
    if (useUnit && !unit.includes("環保") && !unit.includes("環境保護")) return false;
    return true;
  });

  render(rows, useDist, useUnit);
}

function render(rows, useDist, useUnit){
  const labels = [];
  if (useDist) labels.push("前鎮區");
  if (useUnit) labels.push("環保局");
  metaEl.textContent =
    (labels.length ? "篩選：" + labels.join("＋") + "，" : "未套用篩選，") +
    "查詢期間 " + lastRange + "，共 " + rows.length + " 筆（來源資料 " + allRows.length + " 筆）";

  let doing = 0, done = 0;
  rows.forEach(r=>{
    const cls = badgeClass(pick(r,["StatusName","Status"]));
    if (cls === "doing") doing++;
    else if (cls === "ok") done++;
  });
  document.getElementById("stTotal").textContent = rows.length;
  document.getElementById("stDoing").textContent = doing;
  document.getElementById("stDone").textContent  = done;
  sumEl.hidden = false;

  if (!rows.length){
    listEl.innerHTML = '<div class="state">這段期間沒有符合條件的案件。<br>' +
      '前鎮區＋環保局單日案件量本來就可能是零，屬正常情況。<br>' +
      '可以按「近 7 天」或「近 30 天」拉長期間，或關閉其中一個篩選試試。</div>';
    return;
  }

  listEl.innerHTML = rows.map(r=>{
    const status = pick(r,["StatusName","Status"]);
    const cls = badgeClass(status);
    const addr = pick(r,["address","Address"]) || "（未提供地址）";
    const unit = pick(r,["UnitName","ReplyUnit"]);
    const date = fmtDate(pick(r,["CreDate","credate"]));
    const no   = pick(r,["FileNo","Seq"]);
    const zip  = pick(r,["ZipName"]);
    const mapQ = encodeURIComponent("高雄市" + (zip||"") + addr);
    return '<div class="case">' +
      '<div class="case-top">' +
        '<div class="addr">' + esc(addr) + '</div>' +
        '<span class="badge ' + cls + '">' + esc(status || "狀態不明") + '</span>' +
      '</div>' +
      '<div class="row">承辦：<b>' + esc(unit) + '</b>　案號：' + esc(no) + '</div>' +
      '<div class="row">受理時間：' + esc(date) +
      '　<a href="https://www.google.com/maps/search/?api=1&query=' + mapQ + '" target="_blank" rel="noopener">地圖</a></div>' +
    '</div>';
  }).join("");
}

// ---- 載入 ----
async function load(){
  const err = validateRange();
  if (err){
    hintEl.textContent = err;
    hintEl.classList.add("err");
    return;
  }
  hintEl.textContent = "預設查詢當天案件；日期區間最長一年（資料來源限制）。";
  hintEl.classList.remove("err");

  const s = isoToApi(dStart.value);
  const e = isoToApi(dEnd.value);
  lastRange = dStart.value === dEnd.value
    ? dStart.value
    : dStart.value + " ～ " + dEnd.value;
  const url = API_BASE + "?startdate=" + s + "&enddate=" + e;

  listEl.innerHTML = '<div class="state">資料載入中…</div>';
  document.getElementById("btnQuery").disabled = true;
  try{
    const res = await fetch(url, {headers:{"Accept":"application/json"}});
    const text = await res.text();
    let data;
    try{
      data = JSON.parse(text);
    }catch{
      const m = text.match(/\[[\s\S]*\]/);
      if (!m) throw new Error("無法解析回傳格式");
      data = JSON.parse(m[0]);
    }
    if (data && data.d) data = typeof data.d === "string" ? JSON.parse(data.d) : data.d;
    if (!Array.isArray(data)) throw new Error("回傳資料不是清單");

    allRows = data.sort((a,b)=>{
      const ta = String(pick(a,["CreDate"])), tb = String(pick(b,["CreDate"]));
      return tb.localeCompare(ta);
    });
    applyFilters();
  }catch(err2){
    console.error(err2);
    listEl.innerHTML = '<div class="state">' +
      '無法取得資料（可能是市府伺服器暫時無回應，或瀏覽器跨網域限制 CORS）。<br>' +
      '你可以直接開啟這段查詢的原始資料網址確認服務是否正常：<br>' +
      '<code>' + url + '</code>' +
      '<br><button class="btn" onclick="load()">再試一次</button></div>';
    sumEl.hidden = true;
    metaEl.textContent = "";
  }finally{
    document.getElementById("btnQuery").disabled = false;
  }
}

// ---- 事件 ----
chips.dist.addEventListener("click", ()=>{ toggle(chips.dist); applyFilters(); });
chips.unit.addEventListener("click", ()=>{ toggle(chips.unit); applyFilters(); });
function toggle(el){
  el.setAttribute("aria-pressed", el.getAttribute("aria-pressed") === "true" ? "false" : "true");
}
document.getElementById("btnQuery").addEventListener("click", load);
document.getElementById("qToday").addEventListener("click", ()=>{ setRange(0); load(); });
document.getElementById("q7").addEventListener("click", ()=>{ setRange(7); load(); });
document.getElementById("q30").addEventListener("click", ()=>{ setRange(30); load(); });
dStart.addEventListener("change", ()=>{ hintEl.classList.remove("err"); });
dEnd.addEventListener("change", ()=>{ hintEl.classList.remove("err"); });

// 預設：當天
setRange(0);
load();
</script>
</body>
</html>
