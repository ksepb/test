<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前鎮區 × 環保局｜1999 派工案件</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="前鎮1999">
<meta name="application-name" content="前鎮1999">
<meta name="theme-color" content="#0A4A5E">
<style>
  :root{
    --bg:#EDF2F1;
    --card:#FFFFFF;
    --ink:#13262B;
    --ink-soft:#5A6E73;
    --line:#D8E2E0;
    --harbor:#0E6E8C;
    --harbor-deep:#0A4A5E;
    --gold:#C77E1E;
    --ok:#1E8A5A;
    --ok-bg:#E2F3EA;
    --doing:#B3720A;
    --doing-bg:#FBF0DA;
    --other:#5A6E73;
    --other-bg:#EAEEED;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    padding-bottom:56px;
  }
  header{
    background:linear-gradient(160deg,var(--harbor-deep) 0%,var(--harbor) 100%);
    color:#fff;
    padding:22px 20px 26px;
  }
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-size:11px;letter-spacing:.18em;opacity:.72;text-transform:uppercase;margin-bottom:4px}
  h1{font-size:21px;font-weight:700;letter-spacing:.02em}
  h1 .x{opacity:.55;font-weight:400;margin:0 6px}
  .sub{font-size:13px;opacity:.82;margin-top:4px}

  .toolbar{max-width:720px;margin:-14px auto 0;padding:0 14px}
  .toolbar-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;box-shadow:0 6px 18px rgba(10,74,94,.08);
  }
  .filter-label{font-size:12px;color:var(--ink-soft);margin-bottom:6px}
  .filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .chip{
    border:1.5px dashed var(--line);background:#FAFCFB;color:var(--ink-soft);
    border-radius:999px;padding:7px 14px;font-size:13px;cursor:pointer;
  }
  .chip::before{content:"○ ";opacity:.7}
  .chip[aria-pressed="true"]{
    background:#EAF3F0;border:1.5px solid var(--ok);color:var(--ok);font-weight:700;
  }
  .chip[aria-pressed="true"]::before{content:"✓ "}
  .date-row{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
  }
  .date-row input[type="date"]{
    border:1px solid var(--line);border-radius:8px;padding:7px 8px;
    font-size:14px;font-family:inherit;color:var(--ink);background:#F9FBFB;
    flex:1;min-width:130px;
  }
  .date-row .tilde{color:var(--ink-soft)}
  .quick-row{display:flex;gap:8px;margin-top:10px}
  .quick{
    flex:1;border:1px solid var(--line);background:#F4F8F7;color:var(--ink-soft);
    border-radius:8px;padding:7px 0;font-size:13px;cursor:pointer;text-align:center;
  }
  .quick:hover{background:#E9F1EF}
  .btn-search{
    display:block;width:100%;margin-top:14px;
    background:linear-gradient(160deg,var(--harbor) 0%,var(--harbor-deep) 100%);
    color:#fff;border:none;border-radius:12px;
    padding:14px 0;font-size:17px;font-weight:800;letter-spacing:.35em;text-indent:.35em;
    cursor:pointer;box-shadow:0 4px 12px rgba(10,74,94,.25);
  }
  .btn-search:active{transform:translateY(1px)}
  .btn-search:disabled{opacity:.5;cursor:default}
  .btn{
    background:var(--harbor);color:#fff;border:none;border-radius:10px;
    padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;
  }
  .btn.ghost{background:#F4F8F7;color:var(--harbor);border:1px solid var(--line)}
  .chip:focus-visible,.btn:focus-visible,.quick:focus-visible,.btn-search:focus-visible,
  .date-row input:focus-visible{outline:3px solid #7FC3D8;outline-offset:2px}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:10px}
  .hint.err{color:#B3400A;font-weight:600}

  .summary{
    max-width:720px;margin:14px auto 0;padding:0 14px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  }
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:10px 12px;text-align:center;
  }
  .stat b{display:block;font-size:24px;font-variant-numeric:tabular-nums;line-height:1.25}
  .stat span{font-size:12px;color:var(--ink-soft)}
  .stat.doing b{color:var(--doing)}
  .stat.ok b{color:var(--ok)}

  main{max-width:720px;margin:12px auto 0;padding:0 14px}
  .meta-line{font-size:12px;color:var(--ink-soft);margin:4px 2px 10px}

  .case{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin-bottom:10px;
  }
  .case-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .case-no{
    font-size:13px;font-weight:700;color:var(--harbor);
    font-variant-numeric:tabular-nums;letter-spacing:.02em;flex:1;min-width:0;
  }
  .cno-pre{font-size:12px;color:var(--ink-soft);font-weight:600}
  .cno-tail{
    font-size:19px;font-weight:800;color:var(--harbor-deep);
    background:#FDEEBF;padding:1px 8px;border-radius:7px;
    font-variant-numeric:tabular-nums;letter-spacing:.03em;cursor:pointer;
  }
  .cno-tail.copied{background:var(--ok-bg);color:var(--ok)}
  .kv-v .cno-tail{font-size:23px;padding:2px 10px}
  .copy-all{
    display:block;width:100%;margin:12px 0 2px;
    background:#FDEEBF;color:#7A5A00;border:1.5px solid #EED27E;
    border-radius:10px;padding:11px 0;font-size:15px;font-weight:800;
    cursor:pointer;text-align:center;font-family:inherit;
  }
  .copy-all.copied{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
  .badge{font-size:12px;font-weight:700;border-radius:6px;padding:3px 9px;white-space:nowrap}
  .badge.doing{background:var(--doing-bg);color:var(--doing)}
  .badge.ok{background:var(--ok-bg);color:var(--ok)}
  .badge.other{background:var(--other-bg);color:var(--other)}
  .case .desc{font-size:15px;font-weight:600;margin-top:8px;overflow-wrap:anywhere}
  .case .result-preview{
    margin-top:8px;padding:8px 10px;border-radius:8px;
    background:var(--ok-bg);color:#14563B;font-size:13px;overflow-wrap:anywhere;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .case .result-preview b{color:var(--ok)}
  .case .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{font-size:12px;color:var(--ink-soft);background:#F1F5F4;border-radius:6px;padding:3px 9px}
  .case .foot{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    font-size:12px;color:var(--ink-soft);flex-wrap:wrap;
  }
  .case a{color:var(--harbor);text-decoration:none;font-weight:600}
  .case a:hover{text-decoration:underline}
  .case{cursor:pointer}
  .case .expand-hint{font-size:12px;color:var(--harbor);white-space:nowrap}
  .case-detail{display:none;margin-top:12px;border-top:1px solid var(--line);padding-top:4px}
  .case.open .case-detail{display:block}
  .case.open .expand-hint .arrow{display:inline-block;transform:rotate(180deg)}
  .kv-k{
    background:#E4EEEC;color:var(--harbor-deep);font-weight:700;font-size:13px;
    padding:4px 10px;border-radius:6px;margin-top:12px;display:inline-block;
  }
  .kv-v{padding:6px 2px 0;font-size:14px;overflow-wrap:anywhere}
  .nav-btns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .nav-btns a{
    flex:1;min-width:120px;text-align:center;
    background:var(--harbor);color:#fff;border-radius:10px;
    padding:10px 0;font-size:14px;font-weight:700;text-decoration:none;
  }
  .nav-btns a.alt{background:#F4F8F7;color:var(--harbor);border:1px solid var(--line)}
  .nav-btns a:hover{text-decoration:none;opacity:.92}

  .state{
    background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
    padding:24px 18px;text-align:center;color:var(--ink-soft);font-size:14px;
  }
  .state code,.state pre{
    display:block;background:#F0F4F3;border-radius:8px;text-align:left;
    padding:8px 10px;font-size:11px;word-break:break-all;white-space:pre-wrap;
    margin-top:10px;max-height:220px;overflow:auto;
  }
  .state .btn,.state .btn.ghost{margin:12px 4px 0}
  details.diag{margin-top:12px;text-align:left;font-size:12px}
  details.diag summary{cursor:pointer;color:var(--harbor);font-weight:600}

  footer{
    max-width:720px;margin:22px auto 0;padding:0 14px 20px;
    font-size:12px;color:var(--ink-soft);
  }
  footer a{color:var(--harbor)}
  .ver{opacity:.6}
  @media (max-width:400px){.stat b{font-size:20px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="eyebrow">Kaohsiung Open1999</div>
    <h1>前鎮區<span class="x">×</span>環保局</h1>
    <div class="sub">派工案件查詢．打開就是今天的結果</div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-card">
    <div class="filter-label">篩選條件（點一下可開關）</div>
    <div class="filter-row">
      <button class="chip" id="chipDist" aria-pressed="true">前鎮區</button>
      <button class="chip" id="chipUnit" aria-pressed="true">環保局</button>
    </div>
    <div class="date-row">
      <input type="date" id="dateStart" aria-label="起始日期">
      <span class="tilde">～</span>
      <input type="date" id="dateEnd" aria-label="結束日期">
    </div>
    <div class="quick-row">
      <button class="quick" id="qToday">今天</button>
      <button class="quick" id="qYesterday">昨天起</button>
      <button class="quick" id="q7">近 7 天</button>
      <button class="quick" id="q30">近 30 天</button>
    </div>
    <button class="btn-search" id="btnQuery">查詢</button>
    <div class="hint" id="hint">預設查詢當天；日期區間最長一年（資料來源限制）。</div>
  </div>
</div>

<div class="summary" id="summary" hidden>
  <div class="stat"><b id="stTotal">–</b><span>符合案件</span></div>
  <div class="stat doing"><b id="stDoing">–</b><span>處理中</span></div>
  <div class="stat ok"><b id="stDone">–</b><span>已結案</span></div>
</div>

<main>
  <div class="meta-line" id="metaLine"></div>
  <div id="list"></div>
</main>

<footer>
  資料來源：高雄市政府「Open1999 派工受理案件」開放資料。
  若需完整介面仍可前往 <a href="https://soweb.kcg.gov.tw/#/work" target="_blank" rel="noopener">官方查詢頁</a>。
  <span class="ver">｜版本 v12</span>
</footer>

<script>
const API_BASE = "https://soweb.kcg.gov.tw/open1999/ServiceRequestsQuery.asmx/ServiceRequestsQuery";
const listEl = document.getElementById("list");
const metaEl = document.getElementById("metaLine");
const sumEl  = document.getElementById("summary");
const hintEl = document.getElementById("hint");
const dStart = document.getElementById("dateStart");
const dEnd   = document.getElementById("dateEnd");
const chips  = {
  dist: document.getElementById("chipDist"),
  unit: document.getElementById("chipUnit"),
};
let allRows = [];
let lastRange = "";
let lastRawPreview = "";

// ---- 日期工具 ----
function toISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return y + "-" + m + "-" + dd;
}
function isoToApi(iso){ return iso.split("-").join(""); }
function setRange(daysBack){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - daysBack);
  dStart.value = toISO(start);
  dEnd.value = toISO(end);
}
function validateRange(){
  if (!dStart.value || !dEnd.value) return "請選擇起始與結束日期。";
  if (dStart.value > dEnd.value) return "起始日期不能晚於結束日期。";
  const ms = new Date(dEnd.value) - new Date(dStart.value);
  if (ms > 366 * 24 * 60 * 60 * 1000) return "日期區間最長一年，請縮小範圍。";
  return "";
}

// ---- 顯示工具 ----
function badgeClass(status){
  const s = String(status || "");
  if (/結案|完成|已辦結|已完成|解除管制/.test(s)) return "ok";
  if (/處理|辦理|派工|列管|管制中|received/.test(s)) return "doing";
  return "other";
}
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function fmtDate(v){
  if (!v) return "";
  const m = String(v).match(/\/Date\((\d+)\)\//);
  if (m) return new Date(Number(m[1])).toLocaleString("zh-TW",{hour12:false});
  return String(v);
}
function normKey(k){ return String(k).toLowerCase().replace(/[^a-z0-9]/g,""); }
function pick(row, keys){
  for (const k of keys){
    if (row[k] != null && String(row[k]) !== "") return row[k];
    const nk = normKey(k);
    const found = Object.keys(row).find(x => normKey(x) === nk);
    if (found && row[found] != null && String(row[found]) !== "") return row[found];
  }
  return "";
}
function rowText(r){ return Object.values(r).map(v=>String(v??"")).join("｜"); }

// 案件編號：A-IN-2026-145350 → 前段縮小、末段數字放大（登記常只用末段）
function fmtCaseNo(no){
  const s = String(no || "");
  const m = s.match(/^(.*[-–—])(\d+)\s*$/);
  if (!m) return esc(s);
  return '<span class="cno-pre">' + esc(m[1]) + '</span>' +
         '<span class="cno-tail" data-copy="' + esc(m[2]) + '" title="點一下複製">' + esc(m[2]) + '</span>';
}

// ---- 回傳解析：支援 JSON / {d:...} / XML 包 JSON / 純 XML ----
function parseResponse(text){
  try{
    let data = JSON.parse(text);
    if (data && data.d) data = typeof data.d === "string" ? JSON.parse(data.d) : data.d;
    if (Array.isArray(data)) return data;
  }catch(e){}
  const m = text.match(/\[[\s\S]*\]/);
  if (m){
    try{
      const data = JSON.parse(
        m[0].replace(/&quot;/g,'"').replace(/&amp;/g,"&")
             .replace(/&lt;/g,"<").replace(/&gt;/g,">")
      );
      if (Array.isArray(data)) return data;
    }catch(e){}
  }
  try{
    const doc = new DOMParser().parseFromString(text, "text/xml");
    if (!doc.querySelector("parsererror")){
      const counts = {};
      doc.querySelectorAll("*").forEach(n=>{
        if (n.children.length > 0 && [...n.children].every(c=>c.children.length===0)){
          counts[n.tagName] = (counts[n.tagName]||0)+1;
        }
      });
      const rowTag = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
      if (rowTag && counts[rowTag] >= 1){
        const rows = [...doc.getElementsByTagName(rowTag)].map(n=>{
          const o = {};
          [...n.children].forEach(c=>{ o[c.tagName] = c.textContent; });
          return o;
        });
        if (rows.length && Object.keys(rows[0]).length >= 3) return rows;
      }
    }
  }catch(e){}
  return null;
}

// ---- 篩選：欄位優先，欄位空白時退回整列文字搜尋 ----
// 前鎮區郵遞區號 806
function matchDist(r){
  const zip = String(pick(r,["ZipName","DistName"]));
  if (zip) return zip.includes("前鎮");
  const code = String(pick(r,["zipcode"]));
  if (code) return code.startsWith("806");
  return rowText(r).includes("前鎮");
}
function matchUnit(r){
  const unit = String(pick(r,["UnitName","ReplyUnit"]));
  if (unit) return unit.includes("環保") || unit.includes("環境保護");
  return rowText(r).includes("環保");
}

function applyFilters(){
  const useDist = chips.dist.getAttribute("aria-pressed") === "true";
  const useUnit = chips.unit.getAttribute("aria-pressed") === "true";
  const rows = allRows.filter(r=>{
    if (useDist && !matchDist(r)) return false;
    if (useUnit && !matchUnit(r)) return false;
    return true;
  });
  render(rows, useDist, useUnit);
}

function distinctSummary(keys, topN){
  const counts = {};
  allRows.forEach(r=>{
    const v = String(pick(r, keys)) || "（空白）";
    counts[v] = (counts[v]||0)+1;
  });
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0, topN)
    .map(([k,v])=>k+"×"+v)
    .join("、");
}

function render(rows, useDist, useUnit){
  const labels = [];
  if (useDist) labels.push("前鎮區");
  if (useUnit) labels.push("環保局");
  metaEl.textContent =
    (labels.length ? "篩選：" + labels.join("＋") + "，" : "未套用篩選，") +
    "期間 " + lastRange + "，共 " + rows.length + " 筆（來源共 " + allRows.length + " 筆）";

  let doing = 0, done = 0;
  rows.forEach(r=>{
    const cls = badgeClass(pick(r,["StatusName","Status"]));
    if (cls === "doing") doing++;
    else if (cls === "ok") done++;
  });
  document.getElementById("stTotal").textContent = rows.length;
  document.getElementById("stDoing").textContent = doing;
  document.getElementById("stDone").textContent  = done;
  sumEl.hidden = false;

  if (!rows.length){
    let diag = "";
    if (allRows.length){
      let firstRow = "";
      try{ firstRow = JSON.stringify(allRows[0], null, 1).slice(0, 800); }catch(e){}
      diag = '<details class="diag"><summary>看看來源資料長怎樣（除錯用）</summary>' +
        '<div style="margin-top:6px">行政區欄位值：' + esc(distinctSummary(["ZipName","DistName"], 8)) + '</div>' +
        '<div style="margin-top:4px">郵遞區號欄位值：' + esc(distinctSummary(["zipcode"], 8)) + '</div>' +
        '<div style="margin-top:4px">機關欄位值：' + esc(distinctSummary(["UnitName","ReplyUnit"], 8)) + '</div>' +
        '<div style="margin-top:6px">第一筆完整內容：</div><pre>' + esc(firstRow) + '</pre>' +
        '</details>';
    }
    listEl.innerHTML = '<div class="state">' +
      (allRows.length
        ? '這段期間來源有 ' + allRows.length + ' 筆全市案件，但沒有符合「' + (labels.join("＋")||"目前篩選") + '」的。<br>前鎮區＋環保局單日常常是零筆，屬正常情況。'
        : '這段期間來源沒有回傳任何案件。開放資料的更新可能比官網慢半天到一天，<br>今天的案件常要等一段時間才會出現。') +
      '<br><button class="btn ghost" id="btnLoose">關閉篩選看全部</button>' +
      '<button class="btn ghost" id="btnWiden">改查近 7 天</button>' +
      diag + '</div>';
    const bl = document.getElementById("btnLoose");
    if (bl) bl.addEventListener("click", ()=>{
      chips.dist.setAttribute("aria-pressed","false");
      chips.unit.setAttribute("aria-pressed","false");
      applyFilters();
    });
    const bw = document.getElementById("btnWiden");
    if (bw) bw.addEventListener("click", ()=>{ setRange(7); load(); });
    return;
  }

  listEl.innerHTML = rows.map((r, i)=>{
    const status = pick(r,["StatusName","Status"]);
    const cls = badgeClass(status);
    const no   = pick(r,["FileNo","Seq","CaseNo"]);
    const category = pick(r,["InformDesc"]);            // 通報事項（分類）
    const content  = pick(r,["BeforeDesc"]);            // 反應內容（民眾陳情原文）
    const memo = pick(r,["Memo"]);
    const desc = content || category;                    // 卡片標題優先顯示陳情內容
    const addr = pick(r,["address","Address"]);
    const unit = pick(r,["UnitName","ReplyUnit"]);
    const zip  = pick(r,["ZipName","DistName"]);
    const date = fmtDate(pick(r,["CreDate","Cre_Date"]));
    const closeDate = fmtDate(pick(r,["CloseDate","Close_Date"]));
    const lat = parseFloat(pick(r,["Lat"]));
    const lng = parseFloat(pick(r,["Lng"]));
    const hasGeo = isFinite(lat) && isFinite(lng) && lat > 20 && lat < 26;
    const destEnc = hasGeo ? (lat + "," + lng)
      : encodeURIComponent("高雄市" + (zip||"") + (addr||""));
    const gNav = "https://www.google.com/maps/dir/?api=1&destination=" + destEnc + "&travelmode=driving";
    const aNav = hasGeo
      ? "https://maps.apple.com/?daddr=" + lat + "," + lng
      : "https://maps.apple.com/?daddr=" + destEnc;

    function kv(label, val, isHtml){
      if (!val) return "";
      return '<div class="kv-k">' + label + '</div>' +
             '<div class="kv-v">' + (isHtml ? val : esc(val)) + '</div>';
    }
    const navHtml = addr || hasGeo
      ? kv("維修地點",
          esc(addr || (lat + ", " + lng)) +
          '<div class="nav-btns">' +
            '<a href="' + gNav + '" target="_blank" rel="noopener">🧭 Google 導航</a>' +
            '<a class="alt" href="' + aNav + '" target="_blank" rel="noopener">🍎 Apple 地圖</a>' +
          '</div>', true)
      : "";

    return '<div class="case" data-idx="' + i + '">' +
      '<div class="case-head">' +
        '<div class="case-no">' + (no ? fmtCaseNo(no) : "（無案號）") + '</div>' +
        '<span class="badge ' + cls + '">' + esc(status || "狀態不明") + '</span>' +
        '<span class="expand-hint">明細 <span class="arrow">▾</span></span>' +
      '</div>' +
      (desc ? '<div class="desc">' + esc(desc) + '</div>' : '') +
      '<div class="tags">' +
        (zip  ? '<span class="tag">' + esc(zip) + '</span>' : '') +
        (unit ? '<span class="tag">' + esc(unit) + '</span>' : '') +
        (addr ? '<span class="tag">' + esc(addr) + '</span>' : '') +
      '</div>' +
      '<div class="case-detail">' +
        (function(){
          const numOnly = (String(no||"").match(/(\d+)\s*$/) || [,""])[1];
          const payload = [numOnly, addr, content].filter(Boolean).join("\n");
          return payload
            ? '<button class="copy-all" data-copy="' + esc(payload) + '">📋 一鍵複製（案號＋地址＋內容）</button>'
            : "";
        })() +
        kv("案件編號", fmtCaseNo(no), true) +
        kv("權責單位", unit) +
        kv("通報事項", category) +
        kv("行政區域", zip) +
        navHtml +
        kv("通報日期", date) +
        kv("結案日期", closeDate) +
        kv("反應內容", content) +
        kv("備註", memo) +
      '</div>' +
    '</div>';
  }).join("");

  // 點卡片展開／收合明細（點到連結或編號時不觸發）
  listEl.querySelectorAll(".case").forEach(el=>{
    el.addEventListener("click", (ev)=>{
      if (ev.target.closest("a") || ev.target.closest(".cno-tail") || ev.target.closest(".copy-all")) return;
      el.classList.toggle("open");
    });
  });

  // 共用複製函式
  async function copyText(txt){
    try{
      await navigator.clipboard.writeText(txt);
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = txt; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove();
    }
  }

  // 點案號末段數字 → 複製到剪貼簿（登記用）
  listEl.querySelectorAll(".cno-tail").forEach(el=>{
    el.addEventListener("click", async ()=>{
      await copyText(el.getAttribute("data-copy"));
      const orig = el.textContent;
      el.textContent = "已複製"; el.classList.add("copied");
      setTimeout(()=>{ el.textContent = orig; el.classList.remove("copied"); }, 1200);
    });
  });

  // 一鍵複製：案號數字＋維修地址＋反應內容
  listEl.querySelectorAll(".copy-all").forEach(el=>{
    el.addEventListener("click", async (ev)=>{
      ev.stopPropagation();
      await copyText(el.getAttribute("data-copy"));
      const orig = el.textContent;
      el.textContent = "✅ 已複製，可直接貼上"; el.classList.add("copied");
      setTimeout(()=>{ el.textContent = orig; el.classList.remove("copied"); }, 1500);
    });
  });
}

// ---- 載入 ----
async function load(){
  const err = validateRange();
  if (err){
    hintEl.textContent = err;
    hintEl.classList.add("err");
    return;
  }
  hintEl.textContent = "預設查詢當天；日期區間最長一年（資料來源限制）。";
  hintEl.classList.remove("err");

  const s = isoToApi(dStart.value);
  const e = isoToApi(dEnd.value);
  lastRange = dStart.value === dEnd.value
    ? dStart.value
    : dStart.value + " ～ " + dEnd.value;
  const url = API_BASE + "?startdate=" + s + "&enddate=" + e;

  listEl.innerHTML = '<div class="state">資料載入中…</div>';
  document.getElementById("btnQuery").disabled = true;
  try{
    const res = await fetch(url, {headers:{"Accept":"application/json"}, cache:"no-store"});
    const text = await res.text();
    lastRawPreview = text.slice(0, 400);
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = parseResponse(text);
    if (!data) throw new Error("無法解析回傳格式");

    allRows = data.sort((a,b)=>{
      const ta = String(pick(a,["CreDate","Cre_Date"])), tb = String(pick(b,["CreDate","Cre_Date"]));
      return tb.localeCompare(ta);
    });
    applyFilters();
  }catch(err2){
    console.error(err2);
    listEl.innerHTML = '<div class="state">' +
      '無法取得資料（' + esc(err2.message) + '）。<br>' +
      '可能是市府伺服器暫時無回應，或不允許跨網域讀取（CORS）。<br>' +
      '可以直接開這個網址確認資料服務是否正常：' +
      '<code>' + esc(url) + '</code>' +
      (lastRawPreview ? '<details class="diag"><summary>伺服器實際回傳的內容（除錯用）</summary><pre>' + esc(lastRawPreview) + '</pre></details>' : '') +
      '<br><button class="btn" onclick="load()">再試一次</button></div>';
    sumEl.hidden = true;
    metaEl.textContent = "";
  }finally{
    document.getElementById("btnQuery").disabled = false;
  }
}

// ---- 事件 ----
chips.dist.addEventListener("click", ()=>{ toggle(chips.dist); applyFilters(); });
chips.unit.addEventListener("click", ()=>{ toggle(chips.unit); applyFilters(); });
function toggle(el){
  el.setAttribute("aria-pressed", el.getAttribute("aria-pressed") === "true" ? "false" : "true");
}
document.getElementById("btnQuery").addEventListener("click", load);
document.getElementById("qToday").addEventListener("click", ()=>{ setRange(0); load(); });
document.getElementById("qYesterday").addEventListener("click", ()=>{ setRange(1); load(); });
document.getElementById("q7").addEventListener("click", ()=>{ setRange(7); load(); });
document.getElementById("q30").addEventListener("click", ()=>{ setRange(30); load(); });
dStart.addEventListener("change", ()=>{ hintEl.classList.remove("err"); });
dEnd.addEventListener("change", ()=>{ hintEl.classList.remove("err"); });

// 預設：當天
setRange(0);
load();
</script>
</body>
</html>
