<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前鎮區清運時間查詢</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="apple-mobile-web-app-title" content="前鎮清運">
<meta name="theme-color" content="#161a10">
<style>
  :root{
    --bg:#161a13;
    --panel:#212720;
    --accent:#a8dc4a;
    --accent-dim:#5d7a2c;
    --text:#f3f5ed;
    --text-dim:#9aa492;
    --line:#383f33;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% 0%, #232a1c 0%, transparent 55%),
      radial-gradient(circle at 90% 100%, #1d2417 0%, transparent 50%),
      var(--bg);
    color:var(--text);
    font-family:"PingFang TC","Noto Sans TC",-apple-system,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:36px 16px 100px;
  }
  h1{
    font-size:23px;
    letter-spacing:3px;
    margin:0 0 6px;
    color:var(--accent);
    font-weight:800;
    text-shadow:0 0 18px rgba(168,220,74,0.25);
  }
  .sub{
    color:var(--text-dim);
    font-size:13px;
    margin-bottom:14px;
    letter-spacing:1px;
  }
  .time-info{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:60;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:4px 12px;
    padding:9px 14px;
    background:rgba(18,22,14,0.96);
    border-bottom:1px solid rgba(168,220,74,0.3);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    font-size:14px;
    box-shadow:0 3px 14px rgba(0,0,0,0.45);
    transform:translateY(-110%);
    transition:transform .28s ease;
    pointer-events:none;
  }
  .time-info.show{transform:translateY(0);}
  .ti-key{
    font-weight:800;
    color:var(--accent);
    letter-spacing:0.5px;
  }
  .ti-next{
    color:var(--text);
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .ti-remain{
    color:#e6a23c;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .tabs{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    width:100%;
    max-width:none;
    display:flex;
    gap:0;
    margin-bottom:0;
    background:linear-gradient(180deg, #1b2017, #14180f);
    border-top:1px solid var(--line);
    padding:8px 10px calc(10px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 20px rgba(0,0,0,0.4);
    z-index:40;
  }
  .tab-btn{
    flex:1;
    background:transparent;
    border:none;
    color:var(--text-dim);
    border-radius:10px;
    padding:10px 0 8px;
    min-height:52px;
    font-size:11.5px;
    letter-spacing:0;
    white-space:nowrap;
    font-weight:600;
    cursor:pointer;
    transition:all .18s ease;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
  }
  .tab-btn .tab-icon{
    font-size:19px;
    line-height:1;
  }
  .tab-btn:active{transform:scale(0.94);}
  .tab-btn.active{
    background:transparent;
    color:var(--accent);
    border-color:transparent;
    box-shadow:none;
  }
  .route-btn.partner{
    position:relative;
    border:1.5px dashed rgba(230,162,60,0.7);
    overflow:visible;
  }
  .route-btn.partner::after{
    content:'同組';
    position:absolute;
    top:-10px;
    right:-5px;
    font-size:12.5px;
    font-weight:800;
    line-height:1;
    letter-spacing:1px;
    color:#1a1e16;
    background:#e6a23c;
    border-radius:7px;
    padding:3.5px 7px;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }
  .picker-group-label{
    grid-column:1 / -1;
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    letter-spacing:1.5px;
    padding:6px 2px 0;
  }
  .picker{
    width:100%;
    max-width:420px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:9px;
    margin-bottom:24px;
  }
  .route-btn{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:12px;
    padding:14px 0;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    transition:all .15s ease;
  }
  .route-btn:active{transform:scale(0.94);}
  .route-btn.active{
    background:linear-gradient(135deg, var(--accent), #7cb52f);
    color:#161a13;
    border-color:var(--accent);
    box-shadow:0 4px 16px rgba(168,220,74,0.35);
  }
  .card{
    width:100%;
    max-width:420px;
    background:linear-gradient(180deg, rgba(33,39,32,0.9), rgba(27,32,23,0.95));
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px;
    display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(168,220,74,0.06);
  }
  .card.show{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .card-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:16px;
    border-bottom:1px solid var(--line);
    padding-bottom:12px;
  }
  .card-title{
    font-size:15px;
    color:var(--accent);
    letter-spacing:1px;
    font-weight:700;
  }
  .edit-btn{
    font-size:13px;
    color:var(--text-dim);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--line);
    border-radius:20px;
    padding:7px 12px;
    white-space:nowrap;
    cursor:pointer;
    flex-shrink:0;
  }
  .edit-btn.on{
    color:#161a13;
    background:var(--accent);
    border-color:var(--accent);
    font-weight:700;
  }
  .time-edit{
    font-size:20px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    background:#11150e;
    color:var(--text);
    border:1px solid var(--accent);
    border-radius:8px;
    padding:4px 6px;
    width:108px;
  }
  .depart.edited, .arrive.edited{
    border-bottom:2px dashed #e6a23c;
  }
  .reset-times{
    font-size:13px;
    color:#e6a23c;
    background:rgba(230,162,60,0.1);
    border:1px solid rgba(230,162,60,0.35);
    border-radius:20px;
    padding:8px 14px;
    cursor:pointer;
    display:block;
    margin:4px auto 0;
  }
  .trip{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-start;
    gap:14px;
    padding:14px 12px;
    margin:0 0 10px;
    background:rgba(255,255,255,0.02);
    border:1px solid var(--line);
    border-radius:12px;
    transition:background .2s ease, opacity .2s ease;
  }
  .trip:last-child{margin-bottom:0;}
  .trip.tp-past{opacity:0.4;}
  .trip.tp-past .trip-label::after{content:' · 已過站'; font-size:10px;}
  .trip.tp-active{
    background:rgba(168,220,74,0.08);
    border-color:rgba(168,220,74,0.5);
  }
  .trip.tp-active .trip-label{
    color:var(--accent);
    font-weight:700;
    position:relative;
    padding-left:12px;
  }
  .trip.tp-active .trip-label::before{
    content:'';
    position:absolute;
    left:0;
    top:50%;
    width:7px;
    height:7px;
    margin-top:-3.5px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 3px rgba(168,220,74,0.25);
    animation:breathe 1.6s ease-in-out infinite;
  }
  .trip-label{
    font-size:14px;
    color:var(--text-dim);
    width:60px;
  }
  .time-pair{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:22px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .arrow{color:var(--text-dim);font-size:16px;}
  .depart{color:var(--text);}
  .arrive{color:var(--accent);}
  .note{
    font-size:14px;
    color:#e6a23c;
    margin-top:4px;
  }
  .note-link{
    cursor:pointer;
    text-decoration:underline;
  }
  .shuttle-block{
    flex-basis:100%;
    width:100%;
    order:99;
    margin-top:8px;
  }
  .shuttle-summary{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:8px;
    width:100%;
    background:rgba(230,162,60,0.08);
    border:1px solid rgba(230,162,60,0.25);
    border-radius:10px;
    color:#e6a23c;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    padding:10px 12px;
  }
  .shuttle-summary:active{opacity:0.6;}
  .shuttle-arrow{font-size:13px;margin-left:auto;}
  .shuttle-detail{
    display:none;
    flex-direction:column;
    gap:14px;
    margin-top:8px;
    padding:14px;
    background:rgba(230,162,60,0.08);
    border:1px solid rgba(230,162,60,0.25);
    border-radius:12px;
  }
  .shuttle-detail.show{display:flex;}
  .shuttle-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding-bottom:12px;
    border-bottom:1px dashed rgba(230,162,60,0.25);
  }
  .shuttle-item:last-child{padding-bottom:0;border-bottom:none;}
  .shuttle-thumb{
    width:76px;
    height:76px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    flex-shrink:0;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  .shuttle-text{
    font-size:16px;
    color:var(--text);
    line-height:1.4;
    flex:1;
  }
  .buckets{
    display:flex;
    gap:6px;
    margin-top:6px;
  }
  .bucket-chip{
    display:flex;
    align-items:center;
    gap:4px;
    font-size:12px;
    color:var(--text-dim);
    background:#161a13;
    border:1px solid var(--line);
    border-radius:20px;
    padding:4px 10px;
  }
  .bucket-dot{
    width:9px;
    height:9px;
    border-radius:50%;
    display:inline-block;
    box-shadow:0 0 4px rgba(0,0,0,0.4);
  }
  .location{
    font-size:12px;
    color:var(--text-dim);
    margin-top:5px;
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    transition:color .15s ease;
  }
  .location:hover{color:var(--text);}
  .location:active{opacity:0.6;}
  .loc-group{
    margin-top:12px;
    padding-top:10px;
    border-top:1px dashed var(--line);
  }
  .loc-group-title{
    font-size:11px;
    color:var(--accent);
    letter-spacing:1.5px;
    margin-bottom:5px;
    font-weight:700;
  }
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .modal-overlay.show{
    display:flex;
  }
  .modal-box{
    background:linear-gradient(180deg, var(--panel), #1b2017);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    max-width:360px;
    width:100%;
    box-shadow:0 16px 40px rgba(0,0,0,0.5);
  }
  .modal-title{
    font-size:14px;
    color:var(--accent);
    margin-bottom:12px;
    text-align:center;
    font-weight:700;
    letter-spacing:1px;
  }
  .modal-box img{
    width:100%;
    border-radius:12px;
    display:block;
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
  }
  .modal-close{
    width:100%;
    margin-top:16px;
    padding:11px 0;
    background:linear-gradient(135deg, var(--accent-dim), #3f5621);
    color:var(--text);
    border:none;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .legend{
    margin-top:14px;
    font-size:11px;
    color:var(--text-dim);
    display:flex;
    gap:16px;
  }
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
  .reset-btn.armed{
    color:#e6a23c;
    border-color:rgba(230,162,60,0.5);
    background:rgba(230,162,60,0.12);
    font-weight:700;
  }
  .site-footer{
    text-align:center;
    font-size:12px;
    color:var(--text-dim);
    opacity:0.7;
    margin-top:28px;
    padding-bottom:4px;
  }
  .placeholder{
    color:var(--text-dim);
    font-size:13px;
    margin-top:8px;
  }
  .addr-row{
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:16px 0;
    border-bottom:1px solid var(--line);
    font-size:18px;
    cursor:pointer;
    transition:opacity .15s ease;
  }
  .addr-row:last-child{border-bottom:none;}
  .addr-row:active{opacity:0.6;}
  .addr-check{
    flex-shrink:0;
    width:40px;
    height:40px;
    border-radius:50%;
    background:var(--accent-dim);
    color:var(--text);
    font-size:19px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .18s ease;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
  }
  .addr-content{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:4px;
    padding-top:6px;
  }
  .addr-line-main{color:var(--text);transition:all .15s ease;}
  .addr-line-note{
    color:var(--text-dim);
    font-size:14px;
    transition:all .15s ease;
  }
  .addr-hint{
    font-size:15px;
    color:var(--text-dim);
    line-height:1.5;
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px dashed var(--line);
  }
  .list-topbar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:13px;
    padding-bottom:11px;
    border-bottom:1px dashed var(--line);
  }
  .list-topbar:empty{display:none;}
  .back-btn{
    flex:none;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line);
    border-radius:9px;
    color:var(--text);
    font-size:14px;
    font-weight:600;
    padding:7px 13px;
    cursor:pointer;
  }
  .back-btn:active{opacity:.55;}
  .list-hint{
    flex:1;
    font-size:13px;
    color:var(--text-dim);
    line-height:1.65;
    text-align:right;
    letter-spacing:0.3px;
  }
  .list-hint.no-back{text-align:left;}
  .reset-bar{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:22px;
    padding-top:14px;
    border-top:1px dashed var(--line);
  }
  .reset-bar .reset-btn{
    width:100%;
    padding:12px;
    text-align:center;
  }
  .reset-btn{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:24px;
    padding:9px 16px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
  }
  .reset-btn:active{opacity:0.6;transform:scale(0.96);}
  .addr-row.done .addr-check{
    background:linear-gradient(135deg, var(--accent), #7cb52f);
    color:#161a13;
    box-shadow:0 0 10px rgba(168,220,74,0.4);
  }
  .addr-row.done .addr-line-main,
  .addr-row.done .addr-line-note{
    color:var(--text-dim);
    text-decoration:line-through;
  }
  .addr-row.done .addr-time{
    opacity:0.5;
    text-decoration:line-through;
  }
  .addr-group-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:4px 10px;
    font-size:15px;
    font-weight:800;
    letter-spacing:0.5px;
    line-height:1.5;
    color:var(--accent);
    background:#232b1c;
    border:1px solid rgba(168,220,74,0.35);
    border-radius:10px;
    padding:9px 13px;
    margin:14px 0 8px;
    position:sticky;
    top:6px;
    z-index:5;
    box-shadow:0 3px 10px rgba(0,0,0,0.35);
  }
  .addr-group-note{
    font-size:13.5px;
    font-weight:600;
    line-height:1.65;
    letter-spacing:0.3px;
    color:#e6a23c;
    background:rgba(230,162,60,0.08);
    border:1px solid rgba(230,162,60,0.3);
    border-radius:10px;
    padding:10px 13px;
    margin:14px 0 8px;
  }
  .group-meta{
    font-size:12px;
    font-weight:600;
    color:var(--text-dim);
    letter-spacing:0.5px;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .addr-time{
    display:inline-block;
    align-self:flex-start;
    font-size:13px;
    font-weight:600;
    color:var(--accent);
    background:rgba(168,220,74,0.1);
    border-radius:8px;
    padding:3px 8px;
    white-space:nowrap;
  }
  .search-box{
    width:100%;
    max-width:420px;
    margin-bottom:12px;
    padding:11px 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    font-size:14px;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-box:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(168,220,74,0.15);
  }
  .search-box::placeholder{color:var(--text-dim);}
  .nav-link{
    font-size:13px;
    color:var(--accent);
    background:rgba(168,220,74,0.12);
    border:1px solid rgba(168,220,74,0.35);
    border-radius:20px;
    padding:7px 12px;
    margin-left:12px;
    white-space:nowrap;
    cursor:pointer;
    transition:all .15s ease;
    flex-shrink:0;
  }
  .nav-link:active{transform:scale(0.92);}
  .shuttle-nav{margin-left:auto;}
  .addr-row{justify-content:space-between;}
  .order-btns{
    display:flex;
    flex-direction:column;
    gap:3px;
    flex-shrink:0;
  }
  .ord-btn{
    background:rgba(168,220,74,0.08);
    border:1px solid rgba(168,220,74,0.25);
    color:var(--text-dim);
    font-size:11px;
    line-height:1;
    padding:3px 6px;
    border-radius:6px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .ord-btn:active{transform:scale(0.9); background:rgba(168,220,74,0.2);}
  .ord-btn:disabled{opacity:0.25; cursor:default;}
  .ord-btn:disabled:active{transform:none; background:rgba(168,220,74,0.08);}
  .timeline{margin-top:2px;}
  .tl-item{
    position:relative;
    padding:10px 0 10px 26px;
    border-left:2px solid var(--line);
    margin-left:5px;
  }
  .tl-item:last-child{border-left:2px solid transparent;}
  .tl-dot{
    position:absolute;
    left:-7px;
    top:12px;
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--line);
    border:2px solid var(--panel);
  }
  .tl-item.done .tl-dot{background:#5d6656;}
  .tl-item.done{opacity:0.55;}
  .tl-item.active .tl-dot{
    background:var(--accent);
    box-shadow:0 0 0 4px rgba(168,220,74,0.2);
    animation:breathe 1.6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{box-shadow:0 0 0 4px rgba(168,220,74,0.2);}
    50%{box-shadow:0 0 0 8px rgba(168,220,74,0.35);}
  }
  .tl-item.active{
    background:rgba(168,220,74,0.06);
    border-radius:10px;
    margin-left:5px;
  }
  .cat-note{
    width:100%;
    max-width:420px;
    margin-bottom:12px;
  }
  .cat-note-summary{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:8px;
    width:100%;
    background:rgba(168,220,74,0.08);

// 分類改名轉移:星期三配套→三配套、星期日配套→日配套(保留舊勾選紀錄)
(function migrateRename(){
  const map = { '星期三配套': '三配套', '星期日配套': '日配套' };
  Object.keys(localStorage).forEach(k=>{
    for(const oldName in map){
      if(k.startsWith(oldName + ':')){
        const newKey = map[oldName] + k.slice(oldName.length);
        if(localStorage.getItem(newKey) === null) localStorage.setItem(newKey, localStorage.getItem(k));
        localStorage.removeItem(k);
      }
    }
  });
  const last = localStorage.getItem('lastCategory');
  if(last && map[last]) localStorage.setItem('lastCategory', map[last]);
})();

// 責任區順序表:依今天星期幾自動高亮適用欄位
function buildZoneTable(){
  const day = new Date().getDay();        // 0日 1一 ... 6六
  const isMonThu = (day === 1 || day === 4);
  const isTueFri = (day === 2 || day === 5);
  const chips = (nums, extra) =>
    nums.map(n => `<div class="zone-chip">${n}</div>`).join('') +
    (extra ? `<div class="zone-chip dim">${extra}</div>` : '');
  const col = (title, active, other, chipsHtml) => `
    <div class="zone-col ${active ? 'today' : ''} ${other ? 'off' : ''}">
      <div class="zone-col-title">${title}${active ? '<span class="today-tag">今天</span>' : ''}</div>
      <div class="zone-chips">${chipsHtml}</div>
    </div>`;
  return `
    <div class="zone-table">
      ${col('星期一、四', isMonThu, isTueFri, chips([1,2,3,4,9,10,11,12]))}
      ${col('星期二、五', isTueFri, isMonThu, chips([5,6,7,8,13,14,15,16], '17'))}
    </div>`;
}

function renderCategoryNote(){
  const wrap = document.getElementById('categoryNote');
  if(!wrap) return;
  const note = categoryNotes[currentCategory];
  if(!note){
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  wrap.style.display = '';
  const bodyHtml = (typeof note.html === 'function') ? note.html() : note.html;
  wrap.innerHTML = `
    <button class="cat-note-summary" type="button">
      <span>${note.title}</span>
      <span class="shuttle-arrow">▸</span>
    </button>
    <div class="cat-note-body">${bodyHtml}</div>`;
  const btn = wrap.querySelector('.cat-note-summary');
  const body = wrap.querySelector('.cat-note-body');
  btn.onclick = ()=>{
    const isOpen = body.classList.toggle('show');
    btn.querySelector('.shuttle-arrow').textContent = isOpen ? '▾' : '▸';
  };
}

function selectCategory(cat, btn){
  currentCategory = cat;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('card').classList.remove('show');
  document.getElementById('empty').style.display = 'block';
  localStorage.setItem('lastCategory', cat);
  localStorage.removeItem('lastItem');
  currentSelectedKey = null;
  stopCountdown();
  const searchEl = document.getElementById('searchBox');
  if(searchEl) searchEl.value = '';
  updateSearchVisibility();
  renderCategoryNote();
  renderPicker();
}

// 搜尋框只在地址類分頁顯示(垃圾車/回收車/廚餘車編號少,不需要搜尋)
function updateSearchVisibility(){
  const searchEl = document.getElementById('searchBox');
  if(!searchEl) return;
  const cfg = categories[currentCategory];
  searchEl.style.display = (cfg && cfg.type === 'address') ? '' : 'none';
}

function renderPicker(){
  const cfg = categories[currentCategory];
  const picker = document.getElementById('picker');
  picker.innerHTML = '';
  const searchEl = document.getElementById('searchBox');
  const q = (searchEl && searchEl.value || '').trim();
  const fullOrder = cfg.order;
  const list = q ? fullOrder.filter(r => r.includes(q)) : fullOrder;

  if(list.length === 0){
    const none = document.createElement('div');
    none.className = 'placeholder';
    none.style.margin = '0 0 12px';
    none.textContent = '找不到符合的路線';
    picker.appendChild(none);
    return;
  }

  const makeBtn = (key, label)=>{
    const btn = document.createElement('button');
    btn.className = 'route-btn';
    btn.textContent = label || key;
    btn.dataset.key = key;
    btn.onclick = ()=> selectItem(key, btn);
    picker.appendChild(btn);
  };

  if(cfg.groups){
    // 分組顯示:每組一個標題列(佔滿整行),同組按鈕排在同一行
    cfg.groups.forEach(g=>{
      const items = g.items.filter(it => list.includes(it.key));
      if(items.length === 0) return;
      const head = document.createElement('div');
      head.className = 'picker-group-label';
      head.textContent = g.label;
      picker.appendChild(head);
      items.forEach(it => makeBtn(it.key, it.label));
    });
  } else {
    list.forEach(r => makeBtn(r));
  }

  // 還原上次選取(依 data-key 找按鈕,不受分組標題影響)
  const targetKey = !q ? localStorage.getItem('lastItem') : currentSelectedKey;
  if(targetKey && list.includes(targetKey)){
    const btn = Array.from(picker.querySelectorAll('.route-btn')).find(b => b.dataset.key === targetKey);
    if(btn){
      if(!q) selectItem(targetKey, btn);
      else btn.classList.add('active');
      // 剛開啟網頁時自動捲到時間卡片(僅一次),之後手動點選不會捲動
      if(autoScrollOnOpen){
        autoScrollOnOpen = false;
        setTimeout(()=>{
          const card = document.getElementById('cardTitle');
          if(card) card.scrollIntoView({ behavior:'smooth', block:'start' });
        }, 250);
      }
    }
  }
  autoScrollOnOpen = false;
}

function filterAddressRows(){
  const q = (document.getElementById('searchBox').value || '').trim();
  document.querySelectorAll('.addr-row').forEach(row=>{
    const text = row.querySelector('.addr-content').textContent;
    row.style.display = (!q || text.includes(q)) ? 'flex' : 'none';
  });
}

  const cfg = categories[currentCategory];
  if(cfg.type === 'address' && currentSelectedKey){
    filterAddressRows();
  } else {
    renderPicker();
  }
});

// 顯示某路線底下的「任務」選單(例如 西配 → 定點收運 / 髒亂點)
function renderTaskPicker(routeKey, taskGroup){
  const tripsEl = document.getElementById('trips');
  tripsEl.innerHTML = '';

  const hint = document.createElement('div');
  hint.className = 'addr-hint';
  hint.textContent = '請選擇任務項目';
  tripsEl.appendChild(hint);

  Object.keys(taskGroup).forEach(taskName=>{
    const btn = document.createElement('button');
    btn.className = 'route-btn';
    btn.style.width = '100%';
    btn.style.marginBottom = '8px';
    btn.textContent = taskName;
    btn.onclick = ()=> selectTask(routeKey, taskName);
    tripsEl.appendChild(btn);
  });
}

// 選擇某個任務(定點收運 / 髒亂點),顯示該任務底下的地址清單
function selectTask(routeKey, taskName){
  const cfg = categories[currentCategory];
  const masterList = cfg.data[routeKey][taskName];
  // 唯讀清單:時間固定的路線不提供勾選與調整順序
  const readOnly = (currentCategory === '接駁車') ||
    (currentCategory === '日配套' && taskName.startsWith('定點'));
  document.getElementById('cardTitle').textContent =
    `路線 ${routeKey}　·　${taskName}　·　${currentCategory}`;
  renderAddressList(masterList, `${currentCategory}:${routeKey}:${taskName}`, ()=>{
    document.getElementById('cardTitle').textContent =
      `路線 ${routeKey}　·　${currentCategory}`;
    renderTaskPicker(routeKey, cfg.data[routeKey]);
  }, readOnly);
}

// 顯示地址清單(可勾選完成、拖曳排序);onBack 不為 null 時會顯示「返回任務選單」按鈕

// 按兩次確認:第一次按變成警示文字,3秒內再按才執行(不用系統彈窗,LINE內建瀏覽器也能用)
function armConfirm(btn, normalLabel, confirmLabel, action){
  // 確認狀態時隱藏同一列的其他按鈕,避免誤觸
  const siblings = ()=> btn.parentElement
    ? Array.from(btn.parentElement.querySelectorAll('.reset-btn')).filter(b=>b!==btn)
    : [];
  const disarm = ()=>{
    btn.dataset.armed = '';
    btn.textContent = normalLabel;
    btn.classList.remove('armed');
    siblings().forEach(b=>{ b.style.display = ''; });
  };
  btn.onclick = ()=>{
    if(!btn.dataset.armed){
      btn.dataset.armed = '1';
      btn.textContent = confirmLabel;
      btn.classList.add('armed');
      siblings().forEach(b=>{ b.style.display = 'none'; });
      setTimeout(()=>{
        if(btn.isConnected && btn.dataset.armed) disarm();
      }, 3000);
      return;
    }
    disarm();
    action();
  };
}

function renderAddressList(masterList, storageKeyBase, onBack, readOnly){
  const tripsEl = document.getElementById('trips');
  tripsEl.innerHTML = '';

  const topbar = document.createElement('div');
  topbar.className = 'list-topbar';
  if(onBack){
    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.textContent = '← 返回';
    backBtn.onclick = onBack;
    topbar.appendChild(backBtn);
  }
  tripsEl.appendChild(topbar);

  if(!masterList || masterList.length === 0){
    const empty = document.createElement('div');
    empty.className = 'placeholder';
    empty.style.margin = '0';
    empty.textContent = '尚無地址資料';
    tripsEl.appendChild(empty);
    return;
  }

  // 將資料統一整理成 {addr, time, groupIndex, groupLabel} 格式
  // 支援兩種寫法:純字串(舊格式,無時間/無分段)、或 {addr, time, group} 物件(可標時間、可標分段標題)
  let groupIdx = 0;
  const normalized = masterList.map(item=>{
    let addr, time = '', group = null;
    if(typeof item === 'string'){ addr = item; }
    else { addr = item.addr; time = item.time || ''; group = item.group || null; }
    if(group) groupIdx++;
    return { addr, time, groupIndex: groupIdx, groupLabel: group };
  });
  const itemsByAddr = new Map(normalized.map(it=>[it.addr, it]));
  const addrList = normalized.map(it=>it.addr);

  const orderKey = `addrOrder:${storageKeyBase}`;
  const doneKey = `addrDone:${storageKeyBase}`;

  // 讀取自訂順序;若儲存的順序與目前資料不吻合(筆數/內容不同)則退回原始順序
  let order;
  try{
    const savedOrder = JSON.parse(localStorage.getItem(orderKey) || 'null');
    const sameSet = Array.isArray(savedOrder) && savedOrder.length === addrList.length &&
      savedOrder.slice().sort().join('\n') === addrList.slice().sort().join('\n');
    order = sameSet ? savedOrder.slice() : addrList.slice();
  }catch(e){ order = addrList.slice(); }

  // 讀取完成狀態(以地址文字為鍵,不受順序調整影響)
  let doneMap;
  try{
    doneMap = JSON.parse(localStorage.getItem(doneKey) || '{}');
    if(typeof doneMap !== 'object' || doneMap === null) doneMap = {};
  }catch(e){ doneMap = {}; }

  if(readOnly){ order = addrList.slice(); doneMap = {}; }

  function saveOrder(){ localStorage.setItem(orderKey, JSON.stringify(order)); }
  function saveDone(){ localStorage.setItem(doneKey, JSON.stringify(doneMap)); }

  function updateProgress(){ /* 進度表已移除 */ }

  // 依分段重新編號(遇到分段標題就重新從 1 開始數)
  function renumber(){
    let counter = 0;
    Array.from(tripsEl.children).forEach(el=>{
      if(el.classList.contains('addr-group-header')){ counter = 0; return; }
      if(!el.classList.contains('addr-row')) return;
      counter++;
      const addr = el.getAttribute('data-addr');
      if(!doneMap[addr]) el.querySelector('.addr-check').textContent = String(counter);
    });
  }

  // 計算某一列在「同分段內」的顯示序號(勾選時用來還原數字)
  function displayIndexOf(row){
    let count = 0;
    let el = row.previousElementSibling;
    while(el){
      if(el.classList.contains('addr-group-header')) break;
      if(el.classList.contains('addr-row')) count++;
      el = el.previousElementSibling;
    }
    return count + 1;
  }

  if(!readOnly){
    const hint = document.createElement('div');
    hint.className = 'list-hint' + (onBack ? '' : ' no-back');
    hint.innerHTML = '<div>點一下可標記已收取</div><div>點 ▲▼ 可調整順序</div>';
    topbar.appendChild(hint);
  }

  const resetBar = document.createElement('div');
  resetBar.className = 'reset-bar';
  resetBar.innerHTML = `<button class="reset-btn order-btn">↕ 還原順序</button><button class="reset-btn">↺ 一鍵全恢復</button>`;
  const btns = resetBar.querySelectorAll('.reset-btn');
  armConfirm(btns[0], '↕ 還原順序', '⚠ 再按一次確認還原順序', ()=>{
    order = addrList.slice();
    saveOrder();
    renderAddressList(masterList, storageKeyBase, onBack, readOnly);
  });
  armConfirm(btns[1], '↺ 一鍵全恢復', '⚠ 再按一次清除全部勾選', ()=>{
    doneMap = {};
    saveDone();
    tripsEl.querySelectorAll('.addr-row').forEach(row=>{
      row.classList.remove('done');
    });
    renumber();
    updateProgress();
  });
  let lastGroupIndex = null;
  let groupCounter = 0;

  order.forEach((addr, i)=>{
    const info = itemsByAddr.get(addr) || { addr, time:'', groupIndex:0, groupLabel:null };

    if(info.groupIndex !== lastGroupIndex){
      if(info.groupLabel){
        const divider = document.createElement('div');
        if(info.groupLabel.startsWith('※')){
          // 提醒文字:一般區塊,不吸附置頂
          divider.className = 'addr-group-note';
          divider.textContent = info.groupLabel;
        } else {
          divider.className = 'addr-group-header';
          const groupItems = normalized.filter(n => n.groupIndex === info.groupIndex);
          const times = groupItems.map(n => n.time).filter(Boolean);
          const allTimed = times.length === groupItems.length &&
            times.every(t => /^\d{1,2}:\d{2}$/.test(t));
          const meta = allTimed
            ? `${times[0]}–${times[times.length-1]}　·　${groupItems.length}站`
            : '';
          divider.innerHTML = `<span>${info.groupLabel}</span>` +
            (meta ? `<span class="group-meta">${meta}</span>` : '');
        }
        tripsEl.appendChild(divider);
      }
      lastGroupIndex = info.groupIndex;
      groupCounter = 0;
    }
    groupCounter++;
    const displayNum = groupCounter;

    const prevInfo = i > 0 ? itemsByAddr.get(order[i-1]) : null;
    const nextInfo = i < order.length-1 ? itemsByAddr.get(order[i+1]) : null;
    const isFirstInGroup = !prevInfo || prevInfo.groupIndex !== info.groupIndex;
    const isLastInGroup = !nextInfo || nextInfo.groupIndex !== info.groupIndex;

    const row = document.createElement('div');
    row.className = 'addr-row' + (doneMap[addr] ? ' done' : '');
    row.setAttribute('data-addr', addr);
    const addrParts = info.addr.match(/^(.*?)\s*(\(.*\))\s*$/);
    const mainText = addrParts ? addrParts[1] : info.addr;
    const noteText = addrParts ? addrParts[2] : '';
    const mapUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(mainText);
    const orderBtnsHtml = readOnly ? '' : `<span class="order-btns"><button class="ord-btn ord-up" ${isFirstInGroup ? 'disabled' : ''}>▲</button><button class="ord-btn ord-down" ${isLastInGroup ? 'disabled' : ''}>▼</button></span>`;
    row.innerHTML = `${orderBtnsHtml}<span class="addr-check">${doneMap[addr] ? '✓' : displayNum}</span><div class="addr-content"><div class="addr-line-main">${mainText}</div>${noteText ? `<div class="addr-line-note">${noteText}</div>` : ''}${info.time ? `<div class="addr-time">${info.time}</div>` : ''}</div><span class="nav-link">🗺️ 導航</span>`;
    const checkEl = row.querySelector('.addr-check');
    const navEl = row.querySelector('.nav-link');

    navEl.onclick = (e)=>{
      e.stopPropagation();
      window.open(mapUrl, '_blank');
    };

    if(!readOnly){
      row.querySelector('.ord-up').onclick = (e)=>{
        e.stopPropagation();
        if(isFirstInGroup) return;
        [order[i-1], order[i]] = [order[i], order[i-1]];
        saveOrder();
        renderAddressList(masterList, storageKeyBase, onBack, readOnly);
      };

      row.querySelector('.ord-down').onclick = (e)=>{
        e.stopPropagation();
        if(isLastInGroup) return;
        [order[i], order[i+1]] = [order[i+1], order[i]];
        saveOrder();
        renderAddressList(masterList, storageKeyBase, onBack, readOnly);
      };

      row.onclick = ()=>{
        const isDone = !row.classList.contains('done');
        row.classList.toggle('done');
        checkEl.textContent = isDone ? '✓' : String(displayIndexOf(row));
        doneMap[addr] = isDone;
        saveDone();
        updateProgress();
      };
      row.style.cursor = 'pointer';
    }

    tripsEl.appendChild(row);
  });

  if(!readOnly) tripsEl.appendChild(resetBar);

  updateProgress();
  filterAddressRows();
}

// ===== 時間編輯:修改存在手機(localStorage),原始資料不動 =====
let editMode = false;
let suppressTimeSave = false; // 還原過程中封鎖儲存,避免補發的事件把舊值寫回

function ovStoreKey(cat, key){ return `timeOverride:${cat}|${key}`; }

function getOverrides(cat, key){
  try{ return JSON.parse(localStorage.getItem(ovStoreKey(cat, key))) || {}; }
  catch(e){ return {}; }
}

function setOverride(cat, key, tripIdx, which, value){
  const ov = getOverrides(cat, key);
  if(!ov[tripIdx]) ov[tripIdx] = {};
  ov[tripIdx][which] = value;
  localStorage.setItem(ovStoreKey(cat, key), JSON.stringify(ov));
}

function clearOverrides(cat, key){
  localStorage.removeItem(ovStoreKey(cat, key));
}

// 取得套用修改後的時間;original 為原始資料的值
function effTime(ov, tripIdx, which, original){
  return (ov[tripIdx] && ov[tripIdx][which]) ? ov[tripIdx][which] : original;
}

function selectItem(key, btn){
  // 高亮直接依路線名稱比對,即使沒有傳入按鈕也能正確重繪
  document.querySelectorAll('.route-btn').forEach(b=>
    b.classList.toggle('active', (b.dataset.key || b.textContent) === key));

  // 回收車:標記搭檔區(1↔5、2↔6、3↔7、4↔8、9↔13、10↔14、11↔15、12↔16,17單獨)
  const zonePairs = {"1":"5","5":"1","2":"6","6":"2","3":"7","7":"3","4":"8","8":"4",
                     "9":"13","13":"9","10":"14","14":"10","11":"15","15":"11","12":"16","16":"12"};
  document.querySelectorAll('.route-btn').forEach(b=>{
    const k = b.dataset.key || b.textContent;
    const isPartner = currentCategory === '回收車' && k === zonePairs[key];
    b.classList.toggle('partner', isPartner);
  });

  document.getElementById('empty').style.display = 'none';
  localStorage.setItem('lastItem', key);

  const card = document.getElementById('card');
  card.classList.add('show');

  const cfg = categories[currentCategory];
  const isRoute = cfg.order === truckOrder;
  const titlePrefix = currentCategory === '接駁車' ? '' : (cfg.type === 'address' ? '路線 ' : (isRoute ? '路線 ' : '區域 '));
  document.getElementById('cardTitle').textContent =
    titlePrefix + key + '　·　' + currentCategory;

  currentSelectedKey = key;
  startCountdown();

  const tripsEl = document.getElementById('trips');
  tripsEl.innerHTML = '';
  const labels = ['第一趟','第二趟','第三趟'];
  const legend = document.getElementById('legendBox');

  if(cfg.type === 'address'){
    legend.style.display = 'none';
    const rawData = cfg.data[key];
    const isTaskGroup = rawData && !Array.isArray(rawData) && typeof rawData === 'object';

    if(isTaskGroup){
      // 這個路線底下是「任務」(例如 西配 → 定點收運 / 髒亂點),尚未挑選任務前不是地址清單
      renderTaskPicker(key, rawData);
    } else {
      renderAddressList(rawData, `${currentCategory}:${key}`, null, currentCategory === '接駁車');
    }
  } else if(cfg.type === 'truck'){
    legend.style.display = 'flex';
    const ov = getOverrides(currentCategory, key);
    cfg.data[key].forEach((t, i)=>{
      let [rawDep, rawArr, note, img] = Array.isArray(t[2]) ? [t[0],t[1],t[2],null] : t;

      // 自動加註(回收車限定,時間容差±1分鐘):
      // 1) 接駁「開始」時間=本趟到達時間 → 前面加「⭐ 起點有接駁車」
      // 2) 接駁「結束」時間=實際收運結束時間(隱藏表) → 後面加「⭐ 接駁車收到結束」
      if(Array.isArray(note) && currentCategory === '回收車'){
        const toMin = s => { const m = String(s).match(/(\d{1,2}):(\d{2})/); return m ? (+m[1])*60 + (+m[2]) : null; };

        const arrMin = toMin(effTime(ov, i, 'arr', rawArr));
        if(arrMin !== null && !note.some(n => n.text.includes('起點有接駁車'))){
          const hitStart = note.some(n => {
            if(!/開始/.test(n.text) || /續收/.test(n.text)) return false;
            const tm = n.text.match(/(\d{1,2}:\d{2})/);
            return tm && Math.abs(toMin(tm[1]) - arrMin) <= 1;
          });
          if(hitStart) note = [{ text: '⭐ 起點有接駁車' }, ...note];
        }

        const endT = (recycleTripEndTimes[key] || [])[i];
        if(endT && !note.some(n => n.text.includes('接駁車收到結束'))){
          const endMin = toMin(endT);
          const hitEnd = endMin !== null && note.some(n => {
            if(!/結束/.test(n.text)) return false;
            const tm = n.text.match(/(\d{1,2}:\d{2})/);
            return tm && Math.abs(toMin(tm[1]) - endMin) <= 1;
          });
          if(hitEnd) note = [...note, { text: '⭐ 接駁車收到結束' }];
        }
      }
      const dep = effTime(ov, i, 'dep', rawDep);
      const arr = effTime(ov, i, 'arr', rawArr);
      const depEdited = dep !== rawDep;
      const arrEdited = arr !== rawArr;
      const row = document.createElement('div');
      row.className = 'trip';
      row.setAttribute('data-trip-idx', i);
      const timeHTML = editMode
        ? `<input type="time" class="time-edit" value="${dep || ''}" data-idx="${i}" data-which="dep">
           <span class="arrow">→</span>
           <input type="time" class="time-edit" value="${arr || ''}" data-idx="${i}" data-which="arr">`
        : `<span class="depart ${depEdited ? 'edited' : ''}">${dep || '—'}</span>
           <span class="arrow">→</span>
           <span class="arrive ${arrEdited ? 'edited' : ''}">${arr || '—'}</span>`;
      row.innerHTML = `
        <div class="trip-label">${labels[i] || '第' + (i + 1) + '趟'}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-start;">
          <div class="time-pair">${timeHTML}</div>
          ${(!Array.isArray(note) && note) ? `<div class="note ${img ? 'note-link' : ''}">${note}</div>` : ''}
        </div>
        ${Array.isArray(note) ? `
        <div class="shuttle-block">
          <button class="shuttle-summary" type="button">
            <span>🚌 本趟有接駁記錄(${note.filter(n => /開始/.test(n.text)).length})</span>
            <span class="shuttle-arrow">▸</span>
          </button>
          <div class="shuttle-detail">
            ${note.map((n, idx) => `
              <div class="shuttle-item">
                <div class="shuttle-text">${n.text}</div>
                ${(n.nav || /[路街巷弄號]/.test(n.text)) ? `<button class="nav-link shuttle-nav" type="button" data-note-idx="${idx}">🧭 導航</button>` : ''}
              </div>
            `).join('')}
          </div>
        </div>` : ''}
      `;

      // 單一備註(非陣列)若有圖片,點擊開啟大圖
      if(!Array.isArray(note) && note && img){
        const noteEl = row.querySelector('.note');
        if(noteEl) noteEl.onclick = ()=> showImg(note, img);
      }

      // 接駁記錄:預設收合,點擊展開;導航按鈕開啟 Google 地圖
      if(Array.isArray(note)){
        row.querySelectorAll('.shuttle-nav').forEach(btn=>{
          const idx = parseInt(btn.getAttribute('data-note-idx'), 10);
          const n = note[idx];
          btn.onclick = (e)=>{
            e.stopPropagation();
            // nav 欄位若是完整網址(例如 Google Maps 分享連結)就直接開啟
            const q = n.nav || n.text
              .replace(/🚌/g, '')
              .replace(/\d{1,2}:\d{2}/g, '')
              .replace(/^\s*(第\d+台)?\s*(續收開始|開始\/結束|開始|結束|續收)\s*/, '')
              .trim();
            const url = /^https?:\/\//.test(q)
              ? q
              : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
            window.open(url, '_blank');
          };
        });
        const summaryBtn = row.querySelector('.shuttle-summary');
        const detailEl = row.querySelector('.shuttle-detail');
        summaryBtn.onclick = ()=>{
          const isOpen = detailEl.classList.toggle('show');
          summaryBtn.querySelector('.shuttle-arrow').textContent = isOpen ? '▾' : '▸';
        };
      }

      tripsEl.appendChild(row);
    });
  } else if(cfg.type === 'doc'){
    legend.style.display = 'none';
    const doc = cfg.data[key];
    if(doc.note){
      const n = document.createElement('div');
      n.className = 'doc-note';
      n.textContent = doc.note;
      tripsEl.appendChild(n);
    }
    doc.rows.forEach(r=>{
      if(r.section){
        const s = document.createElement('div');
        s.className = 'doc-section';
        s.textContent = r.section;
        tripsEl.appendChild(s);
        return;
      }
      const row = document.createElement('div');
      row.className = 'doc-row';
      row.innerHTML = `
        <span class="doc-prefix">${r.num ? r.num + '.' : '＊'}</span>
        <span>${r.text}</span>
        ${r.time ? `<span class="doc-time">${r.time}</span>` : ''}
      `;
      tripsEl.appendChild(row);
    });
    if(doc.footer){
      const f = document.createElement('div');
      f.className = 'doc-note';
      f.style.marginTop = '12px';
      f.textContent = doc.footer;
      tripsEl.appendChild(f);
    }
  } else {
    legend.style.display = 'none';
    const ovK = getOverrides(currentCategory, key);
    cfg.data[key].forEach((time, i)=>{
      const eff = effTime(ovK, i, 'dep', time);
      const row = document.createElement('div');
      row.className = 'trip';
      row.setAttribute('data-trip-idx', i);
      row.innerHTML = editMode
        ? `<div class="trip-label">${labels[i] || '第' + (i + 1) + '趟'}</div>
           <div class="time-pair"><input type="time" class="time-edit" value="${eff || ''}" data-idx="${i}" data-which="dep"></div>`
        : `<div class="trip-label">${labels[i] || '第' + (i + 1) + '趟'}</div>
           <div class="time-pair"><span class="depart ${eff !== time ? 'edited' : ''}">${eff || '—'}</span></div>`;
      tripsEl.appendChild(row);
    });
  }

  // 編輯按鈕:只在有時間可編輯的分頁顯示
  const editBtn = document.getElementById('editBtn');
  const editable = cfg.type === 'truck' || cfg.type === 'kitchen';
  editBtn.style.display = editable ? '' : 'none';
  editBtn.classList.toggle('on', editMode);
  editBtn.textContent = editMode ? '✔ 完成' : '✏️ 編輯時間';

  if(editable && editMode){
    // 輸入框變更即儲存,並更新倒數與高亮
    tripsEl.querySelectorAll('.time-edit').forEach(inp=>{
      inp.onchange = ()=>{
        // 還原進行中或輸入框已被移出畫面時,一律不儲存
        if(suppressTimeSave || !inp.isConnected) return;
        setOverride(currentCategory, key, parseInt(inp.dataset.idx,10), inp.dataset.which, inp.value);
        updateCountdown();
      };
    });
    // 有修改過才顯示還原按鈕
    if(Object.keys(getOverrides(currentCategory, key)).length){
      const resetBtn = document.createElement('button');
      resetBtn.className = 'reset-times';
      resetBtn.type = 'button';
      resetBtn.textContent = '↩ 還原此路線為預設時間';
      resetBtn.onclick = ()=>{
        // 不用系統彈窗(LINE 內建瀏覽器會忽略),改為按兩次確認
        if(!resetBtn.dataset.armed){
          resetBtn.dataset.armed = '1';
          resetBtn.textContent = '⚠ 再按一次確認還原';
          setTimeout(()=>{
            if(resetBtn.isConnected){
              resetBtn.dataset.armed = '';
              resetBtn.textContent = '↩ 還原此路線為預設時間';
            }
          }, 3000);
          return;
        }
        suppressTimeSave = true; // 封鎖期間任何時間儲存都被忽略
        if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
        setTimeout(()=>{
          clearOverrides(currentCategory, key);
          selectItem(key);
          suppressTimeSave = false;
        }, 80);
      };
      tripsEl.appendChild(resetBtn);
    }
  }
  updateCountdown();
}


// 編輯時間開關
document.getElementById('editBtn').onclick = ()=>{
  editMode = !editMode;
  if(currentSelectedKey) selectItem(currentSelectedKey);
};

// ===== 迷你時間列顯示控制:卡片時間在畫面上時隱藏,避免資訊重複雜亂 =====
let miniBarHasContent = false;
let miniBarTripsVisible = true;
let miniBarObserver = null;
let observedTripEl = null;

function applyMiniBar(){
  const el = document.getElementById('timeInfo');
  if(!el) return;
  el.classList.toggle('show', miniBarHasContent && !miniBarTripsVisible);
}

function ensureTripObserver(){
  const first = document.querySelector('.trip[data-trip-idx="0"]');
  if(first === observedTripEl) return;
  observedTripEl = first;
  if(miniBarObserver){ miniBarObserver.disconnect(); miniBarObserver = null; }
  if(!first || !('IntersectionObserver' in window)){
    miniBarTripsVisible = false;
    return;
  }
  miniBarTripsVisible = true;
  miniBarObserver = new IntersectionObserver(entries=>{
    miniBarTripsVisible = entries[0].isIntersecting;
    applyMiniBar();
  }, { rootMargin:'-40px 0px 0px 0px', threshold:0 });
  miniBarObserver.observe(first);
}

updateSearchVisibility();
renderCategoryNote();
renderPicker();





// 取出目前選取項目的「出發時間」陣列,供倒數計算使用
function getDepartTimes(cfg, key){
  if(!key || !cfg.data[key]) return null;
  const ov = getOverrides(currentCategory, key);
  if(cfg.type === 'truck'){
    return cfg.data[key].map((t, i) => effTime(ov, i, 'dep', Array.isArray(t) ? t[0] : t));
  }
  if(cfg.type === 'kitchen'){
    return cfg.data[key].map((t, i) => effTime(ov, i, 'dep', t));
  }
  return null; // 配套路線沒有時間可倒數
}

function parseTimeToday(hhmm, baseDate){
  if(!hhmm) return null;
  const parts = hhmm.split(':');
  if(parts.length < 2) return null;
  const d = new Date(baseDate);
  d.setHours(parseInt(parts[0], 10), parseInt(parts[1], 10), 0, 0);
  return d;
}

function formatDiff(ms){
  const totalMin = Math.max(0, Math.floor(ms / 60000));
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if(h > 0) return `${h} 小時 ${m} 分`;
  return `${m} 分鐘`;
}

function updateCountdown(){
  const el = document.getElementById('timeInfo');
  if(!el) return;
  const cfg = categories[currentCategory];
  const times = getDepartTimes(cfg, currentSelectedKey);
  if(!times || times.length === 0 || times.every(t => !t)){
    miniBarHasContent = false;
    el.classList.remove('show');
    el.innerHTML = '';
    return;
  }

  const tripLabels = ['第一趟','第二趟','第三趟'];
  const now = new Date();
  let nextIdx = -1;
  let nextDate = null;
  for(let i = 0; i < times.length; i++){
    const t = parseTimeToday(times[i], now);
    if(t && t.getTime() > now.getTime()){
      nextIdx = i;
      nextDate = t;
      break;
    }
  }

  let label, diffMs;
  if(nextIdx === -1){
    // 今日已無班次,顯示明天第一趟
    const tomorrow = new Date(now);
    tomorrow.setDate(tomorrow.getDate() + 1);
    nextDate = parseTimeToday(times[0], tomorrow);
    label = `明天 ${tripLabels[0]}`;
  } else {
    label = tripLabels[nextIdx] || `第${nextIdx+1}趟`;
  }
  diffMs = nextDate - now;

  document.querySelectorAll('.trip[data-trip-idx]').forEach(row=>{
    const idx = parseInt(row.getAttribute('data-trip-idx'), 10);
    row.classList.remove('tp-past', 'tp-active');
    if(nextIdx === -1){
      row.classList.add('tp-past');
    } else if(idx < nextIdx){
      row.classList.add('tp-past');
    } else if(idx === nextIdx){
      row.classList.add('tp-active');
    }
  });

  // 置頂迷你時間列:顯示目前選取的區與下一趟時間
  const icon = (categoryIcons && categoryIcons[currentCategory]) || '';
  const keyName = cfg.type === 'truck' ? `${currentSelectedKey}區` : currentSelectedKey;
  const nextTime = times[nextIdx === -1 ? 0 : nextIdx] || '';
  const mins = Math.max(0, Math.round(diffMs / 60000));
  const remain = isNaN(mins) ? '' :
    (mins >= 60 ? `${Math.floor(mins/60)}時${String(mins%60).padStart(2,'0')}分` : `${mins}分`);
  el.innerHTML =
    `<span class="ti-key">${icon} ${keyName}</span>` +
    `<span class="ti-next">下一趟｜${label} ${nextTime}</span>` +
    (remain ? `<span class="ti-remain">還有 ${remain}</span>` : '');
  miniBarHasContent = true;
  ensureTripObserver();
  applyMiniBar();
}


function startCountdown(){
  stopCountdown();
  updateCountdown();
  countdownTimer = setInterval(updateCountdown, 1000);
}

function stopCountdown(){
  if(countdownTimer){
    clearInterval(countdownTimer);
    countdownTimer = null;
  }
  const el = document.getElementById('timeInfo');
  if(el){
    miniBarHasContent = false;
    el.classList.remove('show');
    el.innerHTML = '';
  }
}

function showImg(title, url){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalImg').src = url;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeImg(){
  document.getElementById('modalOverlay').classList.remove('show');
}
